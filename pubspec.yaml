name: bodyfitclubtt
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  google_sign_in: ^7.2.0
  flutter_facebook_auth: ^7.1.6
  shared_preferences: ^2.5.3
  flutter_stripe: ^10.0.0
  http: ^1.2.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  image_picker: ^1.2.2
  firebase_storage: ^13.3.0
  image_cropper: ^12.2.1
  firebase_messaging: ^16.0.0
  flutter_local_notifications: ^17.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - assets/app_icon_foreground.png
    - assets/splash_logo.png
    - assets/auth/google.png
    - assets/auth/facebook.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon_foreground.png"
  adaptive_icon_background: "#DDA5F0"
  adaptive_icon_foreground: "assets/app_icon_foreground.png"

flutter_native_splash:
  # Rovnaká farba ako brand_background v android/app/src/main/res/values/colors.xml
  color: "#DDA5F0"
  image: assets/native_splash_logo.png
  android: true
  ios: true
  web: false

  android_12:
    # Rovnaká farba ako brand_background v android/app/src/main/res/values/colors.xml
    color: "#DDA5F0"
    image: assets/native_splash_logo.png
